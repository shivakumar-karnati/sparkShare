<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verify OTP</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(270deg,#2f3035,#3a3b3f,#000000,#2f3035);

background-size:600% 600%;

animation:gradientMove 12s ease infinite;
}

@keyframes gradientMove{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.container{

background:rgba(56, 53, 53,0.7);
color: white;
padding:40px;
border-radius:12px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.3);

animation:fadeIn 0.6s ease;
}

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(20px);
}

to{
opacity:1;
transform:translateY(0);
}

}

h2{
margin-bottom:10px;
/* color:#333; */
}

p{
font-size:14px;
/* color:#666; */
margin-bottom:25px;
}

.otp-box{

display:flex;
justify-content:space-between;
margin-bottom:20px;
gap:4px;
}

.otp-box input{

width:45px;
height:50px;
font-size:22px;
text-align:center;
border:2px solid #ddd;
border-radius:8px;
transition:0.3s;
}

.otp-box input:focus{

border-color:#2c5364;
outline:none;
box-shadow:0 0 5px rgba(44,83,100,0.4);

}

button{

width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#2c5364;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;

}

button:hover{

background:#1e3c50;

}

.timer{

margin-top:15px;
font-size:14px;
/* color:#777; */

}

.resend{

margin-top:10px;
display:none;

}

.resend a{

text-decoration:none;
color:#2c5364;
font-weight:bold;

}

.resend a:hover{

text-decoration:underline;

}

@media(max-width:400px){

.container{

width:90%;

}

}

</style>

</head>

<body>

<div class="container">
<p>OTP is sended to your email</p>
<h2>Verify OTP</h2>

<p>Enter the 6-digit OTP sent to your email</p>

<form method="POST">

{% csrf_token %}

<div class="otp-box">

<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>
<input type="text" maxlength="1" required>

</div>

<input type="hidden" name="otp" id="otp_value">

<button type="submit">Verify OTP</button>

</form>

<div class="timer" id="timer">
Resend OTP in 60 seconds
</div>

<div class="resend" id="resend">

<a href="{% url 'resend_otp' %}">Resend OTP</a>

</div>

</div>

<script>

const inputs=document.querySelectorAll(".otp-box input")
const otpValue=document.getElementById("otp_value")

inputs.forEach((input,index)=>{

input.addEventListener("keyup",(e)=>{

if(input.value.length===1 && index<5){

inputs[index+1].focus()

}

let otp=""

inputs.forEach(i=>otp+=i.value)

otpValue.value=otp

})

})

let time=60

let timer=setInterval(()=>{

time--

document.getElementById("timer").innerText=
"Resend OTP in "+time+" seconds"

if(time<=0){

clearInterval(timer)

document.getElementById("timer").style.display="none"

document.getElementById("resend").style.display="block"

}

},1000)

</script>

</body>
</html>
