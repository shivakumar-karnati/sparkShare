{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'resources/edit_post.css' %}">

<div class="edit-wrapper">

    <div class="edit-card">

        <h2 class="form-title">Edit Your Note</h2>

        <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-group">

            <label>Title</label>

            <input
            type="text"
            name="title"
            value="{{ post.title }}"
            required>

        </div>


        <div class="form-group">

            <label>Subject</label>

            <input
            type="text"
            name="subject"
            value="{{ post.subject }}"
            required>

        </div>


        <div class="form-group">

            <label>Current File</label>

            {% if post.file %}

            <div class="current-file">

                <a href="{{ post.file.url }}" target="_blank">
                    {{ post.file.url }}
                </a>

            </div>

            {% else %}

            <p class="no-file">
                No file uploaded
            </p>

            {% endif %}

        </div>


        <div class="form-group">

            <label>Replace File</label>

            <input type="file" name="file">

        </div>


        <button type="submit" class="submit-btn">

            Update Post

        </button>

        </form>

    </div>

</div>

{% endblock %}
