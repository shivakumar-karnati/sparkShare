{% extends "base.html" %}
{% load static %}

{% block content %}

<link rel="stylesheet" href="{% static 'resources/delete_post.css' %}">

<div class="delete-wrapper">

    <div class="delete-card">

        <!-- POST PREVIEW -->
        <div class="post-preview">

            <h2 class="post-title">
                {{ post.title }}
            </h2>

            <p class="post-subject">
                {{ post.subject }}
            </p>

            {% if post.file %}
            <div class="post-file">

                <a href="{{ post.file.url }}" target="_blank">
                    View Attached File
                </a>

            </div>
            {% endif %}

            <p class="post-content">
                {{ post.content|truncatewords:25 }}
            </p>

        </div>

        <div class="divider"></div>

        <!-- CONFIRM DELETE -->
        <div class="confirm-section">

            <h3 class="danger-text">
                Delete this post?
            </h3>

            <p class="warning-text">
                This action cannot be undone.
            </p>

            <form method="post" class="btn-group">
                {% csrf_token %}

                <button type="submit" class="delete-btn">
                    Delete Post
                </button>

                <a href="{% url 'profile' %}" class="cancel-btn">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
